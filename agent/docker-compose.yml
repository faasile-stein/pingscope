services:
  pingscope-agent:
    build: .
    image: pingscope-agent
    container_name: pingscope-agent
    restart: unless-stopped
    # runs as the unprivileged `node` user (see Dockerfile). Everything is dropped
    # except NET_RAW, which the mtr helper picks up via a file capability — so the
    # most this container can ever do is open a raw socket. read_only root fs too.
    cap_drop: ["ALL"]
    cap_add: ["NET_RAW"]
    read_only: true
    environment:
      # public community join token for pingscope.net (preconfigured; override
      # only if you point PINGSCOPE_URL at your own server)
      AGENT_TOKEN: "${AGENT_TOKEN:-UktngTqbL-YVYL2mpKEhEdfPvWhpopNd}"
      # optional public label shown next to your country + AS (no personal info, please)
      AGENT_NAME: "${AGENT_NAME:-}"
      # override only if you run your own PingScope server
      PINGSCOPE_URL: "${PINGSCOPE_URL:-wss://pingscope.net/agent}"
